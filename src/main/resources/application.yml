spring:
  application:
    name: ai-chatbot
  
  thymeleaf:
    cache: false  # Disable caching in dev
    prefix: classpath:/templates/
    suffix: .html

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    whitelabel:
      enabled: false
storage:
  type: local
  local:
    root: ./uploads
  s3:
    bucket: handwritten-notes
    region: us-east-1

llm:
  provider: ollama
  ollama:
    url: http://localhost:11434
    model: llava
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aichatbot: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
